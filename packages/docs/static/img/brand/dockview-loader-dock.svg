<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Dockview loading">
<title>Dockview loading</title>
<style>
.d{transform-box:fill-box;transform-origin:center;opacity:0;animation:dvdock 2.4s cubic-bezier(.5,1.4,.4,1) infinite}
.d2{animation-delay:.15s}.d3{animation-delay:.3s}.d4{animation-delay:.45s}
@keyframes dvdock{0%{opacity:0;transform:scale(.3)}12%{opacity:1;transform:scale(1.08)}20%{transform:scale(1)}75%{opacity:1;transform:scale(1)}88%{opacity:0;transform:scale(.3)}100%{opacity:0}}
@media (prefers-reduced-motion:reduce){.d{animation:none;opacity:1;transform:none}}
</style>
