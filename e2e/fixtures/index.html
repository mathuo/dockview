<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>dockview e2e fixture</title>
        <style>
            html,
            body,
            #app {
                margin: 0;
                height: 100%;
                width: 100%;
            }
            .dv-test-panel {
                height: 100%;
                box-sizing: border-box;
                padding: 8px;
            }
        </style>
    </head>
    <body>
        <div id="app"></div>

        <!-- Built stylesheet so layout-sensitive behaviour (overlay host
             positioning, edge-group peek) matches real usage. -->
        <link
            rel="stylesheet"
            href="/packages/dockview-core/dist/styles/dockview.css"
        />

        <!-- Built UMD bundles. dockview-core exposes the global "dockview-core";
             dockview-modules expects it aliased as DockviewCore. -->
        <script src="/packages/dockview-core/dist/dockview-core.js"></script>
        <script>
            window.DockviewCore = window['dockview-core'];
        </script>
        <script src="/packages/dockview-modules/dist/dockview-modules.js"></script>

        <script>
            (function () {
                const core = window['dockview-core'];
                const modules = window['dockview-modules'];

                // Register the full module set plus the optional keyboard-docking
                // module so the harness can exercise cross-window keyboard work.
                core.registerModules([
                    ...modules.Modules,
                    modules.KeyboardDockingModule,
                ]);

                const el = document.getElementById('app');
                // Opt-in multi-row (wrapping) tabs via `?overflow=wrap` so the
                // wrap behaviour is exercised without affecting other specs.
                const params = new URLSearchParams(location.search);
                const overflow =
                    params.get('overflow') === 'wrap'
                        ? { mode: 'wrap' }
                        : undefined;
                const dockview = new core.DockviewComponent(el, {
                    keyboardNavigation: true,
                    overflow,
                    // Record layout history so the harness can exercise undo/redo
                    // (incl. async popout re-open).
                    layoutHistory: { enabled: true },
                    // Smart Guides — alignment + snapping for floating groups.
                    // Float-only here so the harness geometry is deterministic
                    // (container-edge snapping is covered by unit tests).
                    smartGuides: {
                        snapDistance: 12,
                        snapTargets: { container: false },
                    },
                    // Enable auto-hide edge groups (collapsed-strip peek).
                    autoHideEdgeGroups: true,
                    // A served (not about:blank) target avoids a 404 when the
                    // popout window navigates before dockview injects content.
                    popoutUrl: '/e2e/fixtures/popout.html',
                    // Drop Guide ("compass") + pointer DnD so a panel drag is
                    // drivable in the harness. Inert unless a drag occurs.
                    dndGuide: true,
                    dndStrategy: 'pointer',
                    createComponent: (options) => {
                        const element = document.createElement('div');
                        element.className = 'dv-test-panel';
                        element.tabIndex = 0;
                        // Render the panel id so tests can identify which panel
                        // (e.g. "beta") is showing in the popped-out window.
                        element.textContent = options.id;
                        return {
                            element,
                            init() {},
                            // Record the content-area dimensions the group hands
                            // each panel so the content-sizing seam (group box
                            // minus header) is observable to the harness.
                            layout(width, height) {
                                panelDimensions[options.id] = { width, height };
                            },
                            dispose() {},
                        };
                    },
                });
                dockview.layout(el.clientWidth, el.clientHeight);

                // Test-facing handle.
                const panels = {};
                // Last content-area dimensions each panel was laid out with,
                // keyed by panel id (written by the panel's layout() above).
                const panelDimensions = {};
                window.__dv = {
                    addPanel: (id) => {
                        panels[id] = dockview.addPanel({
                            id,
                            component: 'default',
                            title: id,
                        });
                    },
                    // The content-area dimensions a panel was last laid out
                    // with — the seam reports the group box minus the header.
                    panelDimensions: (id) => panelDimensions[id],
                    // Add `count` long-titled tabs to a single group so the
                    // strip overflows its width — under `?overflow=wrap` they
                    // wrap onto multiple rows.
                    setupWrapTabs: (count) => {
                        for (let i = 0; i < count; i++) {
                            const id = `wrap-tab-${i}`;
                            panels[id] = dockview.addPanel({
                                id,
                                component: 'default',
                                title: `wrap-tab-long-title-${i}`,
                            });
                        }
                    },
                    closePanel: (id) => panels[id] && panels[id].api.close(),
                    // Create a new panel and move it to the right of the
                    // popped-out group — the move lands in the popout's own
                    // gridview, producing a second group (and so a sash) there.
                    splitIntoPopout: (id) => {
                        const popoutGroup = dockview.getPopouts()[0].group;
                        const panel = dockview.addPanel({
                            id,
                            component: 'default',
                            title: id,
                        });
                        panel.api.moveTo({
                            group: popoutGroup,
                            position: 'right',
                        });
                    },
                    popoutActiveGroup: () =>
                        dockview.addPopoutGroup(dockview.activeGroup),
                    groupCount: () => dockview.groups.length,
                    popoutCount: () => dockview.getPopouts().length,
                    closeActivePopout: () =>
                        dockview.getPopouts()[0].group.api.close(),
                    undo: () => dockview.undo(),
                    redo: () => dockview.redo(),
                    canUndo: () => dockview.canUndo,
                    awaitPopoutRestore: () => dockview.popoutRestorationPromise,
                    // Two side-by-side groups for Drop Guide: dragging the left
                    // group's tab over the right group shows the compass.
                    setupDropGuide: () => {
                        dockview.addPanel({
                            id: 'left',
                            component: 'default',
                            title: 'left',
                        });
                        dockview.addPanel({
                            id: 'right',
                            component: 'default',
                            title: 'right',
                            position: { direction: 'right' },
                        });
                    },
                    floatingCount: () => dockview.floatingGroups.length,
                    peekEdge: (position, on) =>
                        dockview.api.peekEdgeGroup(position, on),
                    // Two floating groups for Smart Guides: a target float on
                    // the left (left edge ~120) and a draggable float to its
                    // right. Dragging the right one near x=120 should snap +
                    // draw a guide.
                    setupSmartGuides: () => {
                        dockview.addPanel({
                            id: 'main',
                            component: 'default',
                            title: 'main',
                        });
                        const target = dockview.addPanel({
                            id: 'target',
                            component: 'default',
                            title: 'target',
                        });
                        dockview.addFloatingGroup(target, {
                            x: 120,
                            y: 80,
                            width: 200,
                            height: 160,
                        });
                        const mover = dockview.addPanel({
                            id: 'mover',
                            component: 'default',
                            title: 'mover',
                        });
                        dockview.addFloatingGroup(mover, {
                            x: 450,
                            y: 300,
                            width: 200,
                            height: 160,
                        });
                    },
                    // Auto-hide edge: a center panel + a collapsed left edge
                    // group with one panel, for peek tests. Pass renderer
                    // 'always' to exercise the render-overlay (z-index) path.
                    setupAutoHideEdge: (renderer) => {
                        dockview.addPanel({
                            id: 'main',
                            component: 'default',
                            title: 'main',
                        });
                        dockview.addEdgeGroup('left', {
                            id: 'edge-left',
                            initialSize: 220,
                        });
                        dockview.addPanel({
                            id: 'sidebar',
                            component: 'default',
                            title: 'Sidebar',
                            renderer: renderer || undefined,
                            position: {
                                referenceGroup: 'edge-left',
                                direction: 'within',
                            },
                        });
                        dockview.autoHideEdgeGroup('left');
                    },
                    // Two `always`-rendered panels in one edge group, for the
                    // peek tab-switch test (each renders its own overlay).
                    setupAutoHideEdgeMulti: () => {
                        dockview.addPanel({
                            id: 'main',
                            component: 'default',
                            title: 'main',
                        });
                        dockview.addEdgeGroup('left', {
                            id: 'edge-left',
                            initialSize: 220,
                        });
                        for (const [id, title] of [
                            ['a', 'Alpha'],
                            ['b', 'Bravo'],
                        ]) {
                            dockview.addPanel({
                                id,
                                component: 'default',
                                title,
                                renderer: 'always',
                                position: {
                                    referenceGroup: 'edge-left',
                                    direction: 'within',
                                },
                            });
                        }
                        dockview.autoHideEdgeGroup('left');
                    },
                };
                window.__ready = true;
            })();
        </script>
    </body>
</html>
